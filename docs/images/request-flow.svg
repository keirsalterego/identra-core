<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1728"/>
      <stop offset="100%" stop-color="#13213a"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#95b0e2"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bg2)"/>
  <text x="640" y="56" text-anchor="middle" fill="#ecf3ff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Identra Request and Memory Flow</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="130" width="180" height="88" rx="12" fill="#1c3155" stroke="#4c73b3"/>
    <text x="160" y="178" text-anchor="middle" fill="#e6efff" font-size="18" font-weight="700">1. User Prompt</text>

    <rect x="280" y="130" width="190" height="88" rx="12" fill="#1c3155" stroke="#4c73b3"/>
    <text x="375" y="178" text-anchor="middle" fill="#e6efff" font-size="18" font-weight="700">2. Context Capture</text>

    <rect x="500" y="130" width="190" height="88" rx="12" fill="#1c3155" stroke="#4c73b3"/>
    <text x="595" y="178" text-anchor="middle" fill="#e6efff" font-size="18" font-weight="700">3. Memory Query</text>

    <rect x="720" y="130" width="200" height="88" rx="12" fill="#1c3155" stroke="#4c73b3"/>
    <text x="820" y="178" text-anchor="middle" fill="#e6efff" font-size="18" font-weight="700">4. Prompt Build</text>

    <rect x="950" y="130" width="240" height="88" rx="12" fill="#1c3155" stroke="#4c73b3"/>
    <text x="1070" y="178" text-anchor="middle" fill="#e6efff" font-size="18" font-weight="700">5. Qwen2.5 Generate</text>

    <line x1="250" y1="174" x2="280" y2="174" stroke="#95b0e2" stroke-width="3" marker-end="url(#arrow2)"/>
    <line x1="470" y1="174" x2="500" y2="174" stroke="#95b0e2" stroke-width="3" marker-end="url(#arrow2)"/>
    <line x1="690" y1="174" x2="720" y2="174" stroke="#95b0e2" stroke-width="3" marker-end="url(#arrow2)"/>
    <line x1="920" y1="174" x2="950" y2="174" stroke="#95b0e2" stroke-width="3" marker-end="url(#arrow2)"/>

    <rect x="220" y="330" width="380" height="220" rx="14" fill="#1b2f52" stroke="#4c73b3"/>
    <text x="410" y="370" text-anchor="middle" fill="#e6efff" font-size="22" font-weight="700">Immediate Memory Write</text>
    <text x="250" y="408" fill="#d5e3ff" font-size="15">• Every user/assistant exchange is stored</text>
    <text x="250" y="435" fill="#d5e3ff" font-size="15">• Source tagged as chat-history</text>
    <text x="250" y="462" fill="#d5e3ff" font-size="15">• Available on next prompt retrieval</text>
    <text x="250" y="489" fill="#d5e3ff" font-size="15">• Survives restart via persistent DB</text>

    <rect x="680" y="330" width="380" height="220" rx="14" fill="#1b2f52" stroke="#4c73b3"/>
    <text x="870" y="370" text-anchor="middle" fill="#e6efff" font-size="22" font-weight="700">Background Distillation</text>
    <text x="710" y="408" fill="#d5e3ff" font-size="15">• Converts recent chats into durable facts</text>
    <text x="710" y="435" fill="#d5e3ff" font-size="15">• Runs on interval while service is active</text>
    <text x="710" y="462" fill="#d5e3ff" font-size="15">• Improves long-term preference recall</text>
    <text x="710" y="489" fill="#d5e3ff" font-size="15">• Feeds future retrieval ranking</text>

    <line x1="1070" y1="218" x2="1070" y2="280" stroke="#95b0e2" stroke-width="3" marker-end="url(#arrow2)"/>
    <line x1="1070" y1="280" x2="410" y2="280" stroke="#95b0e2" stroke-width="3" marker-end="url(#arrow2)"/>
    <line x1="410" y1="280" x2="410" y2="330" stroke="#95b0e2" stroke-width="3" marker-end="url(#arrow2)"/>
    <line x1="1070" y1="280" x2="870" y2="330" stroke="#95b0e2" stroke-width="3" marker-end="url(#arrow2)"/>
  </g>
</svg>
